<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .login-container {
      text-align: center;
      background-color: #1e1e1e; /* Mas light na gray para sa box */
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    input {
      display: block; /* Para automatic na mag-new line */
      width: 250px;
      margin: 10px 0;
      padding: 12px;
      border-radius: 5px;
      border: 1px solid #333;
      background-color: #2c2c2c;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
      background-color: #007bff; /* Kulay blue */
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #0056b3; /* Didilim kapag tinapatan ng mouse */
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h1>Login</h1>
    <form>
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <button type="button" onclick="alert('Sent!')">Submit</button>
    </form>
  </div>

</body>
</html>
