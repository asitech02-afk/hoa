<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <style>
    body {
      background-color: #121212;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .reg-container {
      background-color: #1e1e1e;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
      color: #007bff;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #333;
      background-color: #2c2c2c;
      color: #fff;
      box-sizing: border-box; /* Para hindi lumampas ang padding sa width */
    }

    input:focus {
      outline: 2px solid #007bff;
      background-color: #333;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border-radius: 6px;
      border: none;
      background-color: #28a745; /* Kulay green naman para sa Register */
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #218838;
      transform: translateY(-2px); /* May kaunting "angat" effect */
    }

    .footer-text {
      margin-top: 15px;
      font-size: 14px;
      color: #aaa;
    }

    .footer-text a {
      color: #007bff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="reg-container">
    <h1>Create Account</h1>
    <form id="regForm">
      <input type="text" placeholder="Full Name" required>
      <input type="email" placeholder="Email Address" required>
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <input type="password" placeholder="Confirm Password" required>
      
      <button type="submit">Sign Up</button>
    </form>
    
    <div class="footer-text">
      May account na? <a href="login.html">Login dito</a>
    </div>
  </div>

  <script>
    // Simpleng function para ma-handle ang submission
    document.getElementById('regForm').onsubmit = function(e) {
      e.preventDefault();
      alert('Registration Successful!');
    };
  </script>

</body>
</html>
