<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOA Portal - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .register-card { max-width: 450px; margin: 50px auto; border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #2c3e50; border: none; }
        .btn-primary:hover { background-color: #34495e; }
        .header-bg { background: #2c3e50; color: white; border-radius: 15px 15px 0 0; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card register-card">
        <div class="header-bg">
            <h3 class="mb-0">HOA Portal</h3>
            <small>Homeowner Registration</small>
        </div>
        <div class="card-body p-4">
            <form id="registrationForm">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="fullName" class="form-control" placeholder="Juan Dela Cruz" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Block & Lot Number</label>
                    <input type="text" id="address" class="form-control" placeholder="Blk 1 Lot 2" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contact Number</label>
                    <input type="tel" id="contact" class="form-control" placeholder="09123456789" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="juan@email.com" required>
                </div>

                <hr>

                <div class="mb-3">
                    <label class="form-label">Create Username</label>
                    <input type="text" id="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">Submit Registration</button>
            </form>
        </div>
        <div class="card-footer text-center bg-white border-0 pb-4">
            <small class="text-muted">May account na? <a href="login.html">Mag-login dito</a></small>
        </div>
    </div>
</div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Dito natin ilalagay ang connection sa Telegram o Database mamaya
        alert('Salamat sa pag-register! I-ve-verify muna namin ang inyong account.');
        this.reset();
    });
</script>

</body>
</html>
