<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sideliners POS</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #2ecc71; --d: #1a1a1a; --l: #f8f9fa; }
        body { font-family: sans-serif; margin: 0; background: var(--l); display: flex; flex-direction: column; height: 100vh; }
        nav { background: var(--d); display: flex; justify-content: space-around; padding: 10px; }
        nav button { background: none; border: none; color: #777; font-weight: bold; cursor: pointer; padding: 10px; }
        nav button.active { color: var(--p); border-bottom: 2px solid var(--p); }
        main { flex-grow: 1; padding: 15px; overflow-y: auto; }
        .page { display: none; } .page.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-p { background: var(--p); } .btn-a { background: #3498db; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 10px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .total { font-size: 1.8rem; text-align: right; margin: 15px 0; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('pos')" id="tab-pos" class="active">🛒 POS</button>
    <button onclick="showPage('inv')" id="tab-inv">📦 INVENTORY</button>
</nav>

<main>
    <div id="page-pos" class="page active">
        <div class="card">
            <button onclick="toggleCamera()" style="margin-bottom:10px;">📷 Open Camera</button>
            <div id="reader"></div>
            <input type="text" id="pos-barcode" placeholder="Scan Barcode (Enter to add)..." autofocus>
        </div>
        <div class="card">
            <h3>Cart</h3>
            <table id="cart-table">
                <thead><tr><th>Item</th><th>Price</th></tr></thead>
                <tbody id="cart-body"></tbody>
            </table>
            <div class="total">₱<span id="g-total">0.00</span></div>
            <button class="btn btn-p" onclick="checkout()">CHECKOUT</button>
        </div>
    </div>

    <div id="page-inv" class="page">
        <div class="card">
            <h3>Add Product</h3>
            <input type="text" id="inv-barcode" placeholder="Barcode ID">
            <input type="text" id="inv-name" placeholder="Product Name">
            <input type="number" id="inv-price" placeholder="Price (₱)">
            <input type="number" id="inv-stock" placeholder="Initial Stock">
            <button class="btn btn-a" onclick="saveToDB()">SAVE TO DATABASE</button>
        </div>
    </div>
</main>

<script>
    // --- CONFIG ---
    const SB_URL = 'PALITAN_ITO_NG_SUPABASE_URL';
    const SB_KEY = 'PALITAN_ITO_NG_ANON_KEY';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let cart = [];
    let html5QrCode;

    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(bt => bt.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        document.getElementById('tab-'+p).classList.add('active');
        if(p==='pos') document.getElementById('pos-barcode').focus();
    }

    // --- SCANNER LOGIC ---
    document.getElementById('pos-barcode').addEventListener('keypress', e => {
        if(e.key === 'Enter') { addToCart(e.target.value); e.target.value = ''; }
    });

    async function addToCart(bc) {
        const { data, error } = await _supabase.from('products').select('*').eq('barcode', bc).single();
        if(data) {
            cart.push(data);
            renderCart();
        } else {
            alert("Product not found!");
        }
    }

    function renderCart() {
        const b = document.getElementById('cart-body');
        let t = 0; b.innerHTML = '';
        cart.forEach(i => { t += i.price; b.innerHTML += `<tr><td>${i.name}</td><td>₱${i.price}</td></tr>`; });
        document.getElementById('g-total').innerText = t.toFixed(2);
    }

    // --- INVENTORY LOGIC ---
    async function saveToDB() {
        const bc = document.getElementById('inv-barcode').value;
        const nm = document.getElementById('inv-name').value;
        const pr = document.getElementById('inv-price').value;
        const st = document.getElementById('inv-stock').value;

        const { error } = await _supabase.from('products').upsert({ barcode: bc, name: nm, price: pr, stock: st });
        if(!error) { 
            alert("Saved!"); 
            ['inv-barcode','inv-name','inv-price','inv-stock'].forEach(id => document.getElementById(id).value='');
        } else { alert(error.message); }
    }

    async function checkout() {
        if(cart.length === 0) return;
        const total = cart.reduce((sum, i) => sum + i.price, 0);
        const { error } = await _supabase.from('sales').insert({ items: cart, total_amount: total });
        if(!error) {
            alert("Paid: ₱" + total);
            cart = []; renderCart();
        }
    }

    async function toggleCamera() {
    const r = document.getElementById('reader');
    if(r.style.display === 'none' || !r.style.display) {
        r.style.display = 'block';
        
        // Check muna kung may camera permission
        try {
            const devices = await Html5Qrcode.getCameras();
            if (devices && devices.length) {
                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start(
                    { facingMode: "environment" }, // Mas mainam para sa likod na camera
                    { fps: 10, qrbox: { width: 250, height: 150 } },
                    (bc) => {
                        if(document.getElementById('page-pos').classList.contains('active')) addToCart(bc);
                        else document.getElementById('inv-barcode').value = bc;
                        // Optional: Mag-beep dito pag naka-scan
                    }
                );
            }
        } catch (err) {
            alert("Camera Error: " + err);
            r.style.display = 'none';
        }
    } else {
        await html5QrCode.stop();
        r.style.display = 'none';
    }
}

</script>
</body>
</html>
