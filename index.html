<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grocery POS | Scanner Support</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --bg: #f0f2f5;
      --dark: #1a1a1a;
      --primary: #2ecc71;
      --accent: #e74c3c;
    }

    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
    
    header { background: var(--dark); color: white; padding: 15px; text-align: center; display: flex; justify-content: space-between; align-items: center; }

    .main-container { display: grid; grid-template-columns: 1fr 380px; flex-grow: 1; overflow: hidden; }

    /* Left Side: Scanning & Search */
    .scanner-section { padding: 20px; overflow-y: auto; background: white; }
    
    #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 10px; overflow: hidden; display: none; } /* Hidden by default */

    .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
    input#barcode-input { flex-grow: 1; padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 8px; }

    /* Right Side: Cart */
    .cart-section { background: #fff; border-left: 2px solid #ddd; display: flex; flex-direction: column; padding: 20px; }
    .cart-items { flex-grow: 1; overflow-y: auto; }
    .cart-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    
    .total-box { font-size: 2rem; font-weight: bold; text-align: right; margin: 20px 0; color: var(--primary); }
    .btn-checkout { background: var(--primary); color: white; border: none; padding: 20px; border-radius: 10px; font-size: 1.5rem; cursor: pointer; }

    @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } .cart-section { height: 400px; } }
  </style>
</head>
<body>

  <header>
    <span>🛒 GROCERY POS</span>
    <button onclick="toggleCamera()" style="padding: 10px; border-radius: 5px; cursor: pointer;">📷 Open Camera</button>
  </header>

  <div class="main-container">
    <div class="scanner-section">
      <div id="reader"></div>

      <div class="input-group">
        <input type="text" id="barcode-input" placeholder="Scan Barcode or Type Code..." autofocus>
      </div>

      <div id="product-info" style="padding: 20px; background: #f9f9f9; border-radius: 10px; text-align: center;">
        <h3>Handa na sa Pag-scan</h3>
        <p>I-scan ang barcode gamit ang scanner o i-type sa box sa itaas.</p>
      </div>
    </div>

    <div class="cart-section">
      <h3>Checkout List</h3>
      <div class="cart-items" id="cart-list"></div>
      <div class="total-box">₱<span id="grand-total">0.00</span></div>
      <button class="btn-checkout" onclick="checkout()">BAYAD</button>
    </div>
  </div>

  <script>
    let cart = [];
    let html5QrCode;

    // --- PC Plug-and-Play Scanner Logic ---
    const barcodeInput = document.getElementById('barcode-input');
    barcodeInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        const barcode = e.target.value;
        findProduct(barcode);
        e.target.value = ''; // Clear input after scan
      }
    });

    // --- Mobile Camera Scanner Logic ---
    function toggleCamera() {
      const readerDiv = document.getElementById('reader');
      if (readerDiv.style.display === 'none' || readerDiv.style.display === '') {
        readerDiv.style.display = 'block';
        startCamera();
      } else {
        html5QrCode.stop().then(() => { readerDiv.style.display = 'none'; });
      }
    }

    function startCamera() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { fps: 10, qrbox: { width: 250, height: 150 } };
      html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
        findProduct(decodedText);
      });
    }

    // --- Product Logic (Dito ikokonekta ang Supabase mamaya) ---
    function findProduct(barcode) {
      // Sample Data - Sa susunod na step, ito ay galing na sa Supabase
      const inventory = {
        "123456": { name: "Lucky Me Noodles", price: 15.00 },
        "789012": { name: "Coke 1.5L", price: 65.00 },
        "001122": { name: "Sardines (555)", price: 22.00 }
      };

      const product = inventory[barcode];
      if (product) {
        cart.push(product);
        updateUI();
      } else {
        alert("Product with Barcode " + barcode + " not found!");
      }
    }

    function updateUI() {
      const cartList = document.getElementById('cart-list');
      const totalDisplay = document.getElementById('grand-total');
      cartList.innerHTML = '';
      let total = 0;

      cart.forEach(item => {
        total += item.price;
        cartList.innerHTML += `
          <div class="cart-row">
            <span>${item.name}</span>
            <span>₱${item.price.toFixed(2)}</span>
          </div>`;
      });
      totalDisplay.innerText = total.toFixed(2);
    }

    function checkout() {
      if(cart.length === 0) return alert("Empty Cart!");
      alert("Success! Transaction Sent to Telegram.");
      cart = [];
      updateUI();
    }
  </script>
</body>
</html>
